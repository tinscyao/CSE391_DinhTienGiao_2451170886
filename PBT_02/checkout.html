<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đặt hàng</title>
</head>
<body>

<h2>Đặt hàng</h2>

<!-- BONUS: tìm sản phẩm -->
<label for="search">Tìm sản phẩm:</label>
<input list="sp" id="search" name="search" placeholder="Nhập tên...">

<datalist id="sp">
    <option value="Điện thoại">
    <option value="Laptop">
    <option value="Tai nghe">
</datalist>

<br><br>

<!-- Phần 1: Giỏ hàng -->
<table border="1" width="600">
    <thead>
        <tr>
            <th>STT</th>
            <th>Sản phẩm</th>
            <th>Đơn giá</th>
            <th>Số lượng</th>
            <th>Thành tiền</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td>1</td>
            <td>Điện thoại</td>
            <td>5000000</td>
            <td>1</td>
            <td>5000000</td>
        </tr>

        <tr>
            <td>2</td>
            <td>Laptop</td>
            <td>10000000</td>
            <td>1</td>
            <td>10000000</td>
        </tr>

        <tr>
            <td>3</td>
            <td>Tai nghe</td>
            <td>500000</td>
            <td>2</td>
            <td>1000000</td>
        </tr>
    </tbody>

    <tfoot>
        <tr>
            <td colspan="4">Tổng cộng</td>
            <td><output>16000000</output></td>
        </tr>
    </tfoot>
</table>

<br>

<!-- Phần 2 + 3 -->
<form action="#" method="POST">

    <fieldset>
        <legend>Thanh toán</legend>

        <p>Phương thức:</p>

        <input type="radio" id="cod" name="pay">
        <label for="cod">COD</label>

        <input type="radio" id="bank" name="pay">
        <label for="bank">Chuyển khoản</label>

        <input type="radio" id="ewallet" name="pay">
        <label for="ewallet">Ví điện tử</label>

        <br><br>

        <label for="sale">Mã giảm giá:</label><br>
        <input type="text" id="sale" name="sale"
               placeholder="SALE2026"
               pattern="SALE[0-9]{4}">

        <br><br>

        <label for="note">Ghi chú:</label><br>
        <textarea id="note" rows="3"></textarea>
    </fieldset>

    <br>

    <fieldset>
        <legend>Giao hàng</legend>

        <label for="date">Ngày giao:</label><br>
        <input type="date" id="date" name="date"
               min="2026-04-24"><br><br>

        <label for="time">Khung giờ:</label><br>
        <select id="time">
            <option>Sáng 8-12h</option>
            <option>Chiều 14-18h</option>
            <option>Tối 18-21h</option>
        </select><br><br>

        <label for="range">Số ngày giao:</label><br>
        <input type="range" id="range" min="1" max="7" step="1"><br><br>

        <!-- bonus -->
        <p>Điểm tích lũy:</p>
        <progress value="60" max="100"></progress>
    </fieldset>

    <br>

    <button type="submit" aria-label="Xác nhận đặt hàng">Đặt hàng</button>

</form>

</body>
</html>
